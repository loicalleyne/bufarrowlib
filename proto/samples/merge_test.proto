syntax = "proto3";

// Test messages for MergeMessageDescriptors tests.
// These messages intentionally have only scalar fields with
// non-overlapping field names and field numbers.

message MergeA {
  string name = 1;
  int32 age = 2;
}

message MergeB {
  double score = 3;
  bool active = 4;
}

message MergeC {
  string name = 1;
  float rating = 5;
}
